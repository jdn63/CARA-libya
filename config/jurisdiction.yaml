methodology:
  framework: "INFORM Risk Index"
  framework_url: "https://drmkc.jrc.ec.europa.eu/inform-index"
  sendai_alignment: true
  sendai_priorities:
    - "Understanding disaster risk"
    - "Strengthening disaster risk governance"
    - "Investing in disaster risk reduction"
    - "Enhancing disaster preparedness"
  missing_data_policy: "regional_average_proxy"
  missing_data_policy_ar: "متوسط المنطقة كبديل موثق"
  missing_data_policy_note: >
    When municipal-level data is unavailable for an indicator, the regional
    average for that indicator (Tripolitania, Cyrenaica, or Fezzan) is used
    as a proxy. This substitution is always flagged explicitly in output
    reports and the methodology documentation. National averages are used
    when regional data is also unavailable. This policy is consistent with
    INFORM Index methodology for data-sparse contexts.
  armed_clashes_domain_status: "omitted_pending_review"
  armed_clashes_domain_note: >
    The armed clashes hazard domain has been omitted pending review of
    political sensitivity considerations and data source access confirmation.
    The domain architecture is preserved in the codebase for future activation.

